version: '3.8'

services:
  postgres:
    container_name: outreach-postgres
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=localdevpassword
      - POSTGRES_DB=outreach_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
